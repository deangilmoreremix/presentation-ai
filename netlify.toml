[build]
  command = "pnpm build"
  publish = ".next"

  [build.environment]
    NODE_VERSION = "18"
    NPM_VERSION = "10"
    NODE_OPTIONS = "--max-old-space-size=4096"
    SKIP_ENV_VALIDATION = "true"

[dev]
  command = "pnpm dev"
  port = 3000
  targetPort = 3000

[[plugins]]
  package = "@netlify/plugin-nextjs"