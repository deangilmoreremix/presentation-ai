# Logrotate Configuration for Presentation AI
# Install in /etc/logrotate.d/presentation-ai

/path/to/app/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0644 www-data www-data
    postrotate
        # Reload application if needed
        docker-compose -f /path/to/app/docker-compose.prod.yml logs --tail=0 > /dev/null 2>&1 || true
    endscript
}

/path/to/app/nginx/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0644 www-data www-data
    postrotate
        docker-compose -f /path/to/app/docker-compose.prod.yml exec nginx nginx -s reload > /dev/null 2>&1 || true
    endscript
}

# Docker container logs
/var/lib/docker/containers/*/*-json.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    copytruncate
    notifempty
    create 0644 root root
}